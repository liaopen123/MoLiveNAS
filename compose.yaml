services:
  molive-nas:
    build: .
    container_name: molive-nas
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file: .env
    ports:
      - "8787:8787"
    volumes:
      - /vol1/1000/Photos:/input:ro
      - /vol1/1000/MoLive/output:/output
      - /vol1/1000/MoLive/data:/data
    devices:
      - /dev/dri:/dev/dri
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
